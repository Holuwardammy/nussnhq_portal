{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Fundraising</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header style="background-color:#C9A227; color:#FFFFFF; padding:20px;">
        <h1>Create Fundraising</h1>
    </header>
    <main>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Create Fundraising</button>
        </form>
    </main>
</body>
</html>
