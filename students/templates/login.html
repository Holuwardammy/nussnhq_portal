{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="login-container">

    <h2>Login</h2>

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <label>Email or Serial Number</label>
        <input type="text" name="username" placeholder="Enter email or serial number" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

    </form>

    <p>Don't have an account? 
        <a href="{% url 'register_student' %}">Register here</a>
    </p>

</div>

</body>
</html>
