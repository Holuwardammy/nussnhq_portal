{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Event</title>
    <link rel="stylesheet" href="{% static 'css/admin_dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/forms.css' %}">
</head>
<body>

<header>
    <h1>{% if edit_mode %}Edit Event{% else %}Create New Event{% endif %}</h1>
    <div class="header-actions">
        <a href="{% url 'admin_dashboard' %}" class="switch-btn">Back to Dashboard</a>
    </div>
</header>

<div class="container">
    <div class="form-card">
        <!-- CRITICAL CHANGE: Added enctype for image uploads -->
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    <!-- Django will now render the 'image' field here automatically -->
                    {{ field }}
                    
                    {% if field.errors %}
                        <div class="error-text">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="submit-btn">Create Event</button>
        </form>
    </div>
</div>

</body>
</html>
